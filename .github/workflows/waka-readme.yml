name: Waka Readme

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    # Runs at 12 AM UTC daily
    - cron: "0 0 * * *"

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master # Action to fetch and update stats
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
